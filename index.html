    <style>
        /* ============================================================ */
        /* GLOBAL FONT & K-MINIMAL PINK THEME                          */
        /* ============================================================ */
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Prompt', 'Segoe UI', sans-serif;
            background-color: #FFF5F7;
        }

        /* ============================================================ */
        /* PASTEL PINK CLASSIC PALETTE                                 */
        /* Primary: #FFD1DC  |  White: #FFF  |  Gray: #E0E0E0        */
        /* ============================================================ */
        /* Backgrounds */
        .bg-blue-50  { background-color: #FFF5F7 !important; }
        .bg-blue-100 { background-color: #FFE4EC !important; }
        .bg-blue-200 { background-color: #FFD1DC !important; }
        .bg-blue-400 { background-color: #F48FB1 !important; }
        .bg-blue-500 { background-color: #EC407A !important; }
        .bg-blue-600 { background-color: #D81B60 !important; }
        .bg-blue-700 { background-color: #C2185B !important; }
        .bg-blue-800 { background-color: #AD1457 !important; }
        .bg-blue-900 { background-color: #880E4F !important; }
        .bg-purple-50  { background-color: #FFF5F7 !important; }
        .bg-purple-100 { background-color: #FFE4EC !important; }
        .bg-purple-500 { background-color: #F48FB1 !important; }
        .bg-purple-600 { background-color: #EC407A !important; }
        /* Text */
        .text-blue-100 { color: #FFE4EC !important; }
        .text-blue-200 { color: #FFD1DC !important; }
        .text-blue-300 { color: #F48FB1 !important; }
        .text-blue-400 { color: #EC407A !important; }
        .text-blue-500 { color: #EC407A !important; }
        .text-blue-600 { color: #D81B60 !important; }
        .text-blue-700 { color: #C2185B !important; }
        .text-blue-800 { color: #AD1457 !important; }
        .text-purple-600 { color: #D81B60 !important; }
        .text-purple-800 { color: #AD1457 !important; }
        /* Borders */
        .border-blue-200 { border-color: #FFD1DC !important; }
        .border-blue-300 { border-color: #F48FB1 !important; }
        .border-blue-500 { border-color: #EC407A !important; }
        .border-blue-600 { border-color: #D81B60 !important; }
        /* Hover */
        .hover\:bg-blue-50:hover  { background-color: #FFF5F7 !important; }
        .hover\:bg-blue-600:hover { background-color: #D81B60 !important; }
        .hover\:bg-blue-700:hover { background-color: #C2185B !important; }
        .hover\:bg-purple-600:hover { background-color: #D81B60 !important; }
        .hover\:text-blue-600:hover { color: #D81B60 !important; }
        .hover\:text-blue-500:hover { color: #EC407A !important; }
        /* Focus rings */
        .focus\:ring-blue-400:focus { --tw-ring-color: rgba(244,143,177,.4) !important; }
        .focus\:ring-blue-500:focus { --tw-ring-color: rgba(236,64,122,.4) !important; }
        /* Gradients */
        .from-blue-400 { --tw-gradient-from: #F48FB1 !important; }
        .from-blue-500 { --tw-gradient-from: #EC407A !important; }
        .from-blue-600 { --tw-gradient-from: #D81B60 !important; }
        .from-blue-700 { --tw-gradient-from: #C2185B !important; }
        .from-blue-900 { --tw-gradient-from: #880E4F !important; }
        .to-blue-600   { --tw-gradient-to: #D81B60 !important; }
        .to-blue-700   { --tw-gradient-to: #C2185B !important; }
        .via-blue-700  { --tw-gradient-stops: var(--tw-gradient-from), #C2185B, var(--tw-gradient-to) !important; }
        .from-purple-600 { --tw-gradient-from: #EC407A !important; }
        .to-purple-600   { --tw-gradient-to: #EC407A !important; }
        .to-purple-700   { --tw-gradient-to: #C2185B !important; }
        .to-purple-800   { --tw-gradient-to: #AD1457 !important; }
        .hover\:from-blue-600:hover { --tw-gradient-from: #D81B60 !important; }
        .hover\:to-blue-700:hover   { --tw-gradient-to: #C2185B !important; }
        /* Selected role card */
        .border-blue-500.bg-blue-50 { border-color: #EC407A !important; background-color: #FFF5F7 !important; }

        /* Page background */
        .min-h-screen.bg-gray-50 { background-color: #FFF5F7 !important; }
        .bg-gray-50 { background-color: #FFF5F7 !important; }

        /* Scrollbar — soft pink */
        ::-webkit-scrollbar { width: 7px; height: 7px; }
        ::-webkit-scrollbar-track { background: #F5F5F5; }
        ::-webkit-scrollbar-thumb { background: #F48FB1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #EC407A; }

        /* VSCode-like Code Editor */
        .code-editor-container {
            display: flex;
            background-color: #1e1e1e;
            border-radius: 0.75rem;
            overflow: hidden;
            font-family: 'JetBrains Mono', 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
        }
        .line-numbers {
            background-color: #252526;
            color: #858585;
            padding: 16px 12px;
            text-align: right;
            user-select: none;
            min-width: 50px;
            border-right: 1px solid #3e3e42;
        }
        .code-input-area {
            flex: 1;
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 16px;
            border: none;
            outline: none;
            resize: none;
            font-family: inherit;
            font-size: inherit;
            line-height: inherit;
            white-space: pre;
            overflow-wrap: normal;
            overflow-x: auto;
        }
        .code-input-area::placeholder { color: #6a737d; }

        /* Highlight.js VSCode Dark+ */
        .hljs { background: #1e1e1e; color: #d4d4d4; }
        .hljs-keyword { color: #569cd6; }
        .hljs-string { color: #ce9178; }
        .hljs-number { color: #b5cea8; }
        .hljs-comment { color: #6a9955; font-style: italic; }
        .hljs-function { color: #dcdcaa; }
        .hljs-title { color: #4ec9b0; }
        .hljs-params { color: #9cdcfe; }
        .hljs-built_in { color: #4ec9b0; }
        .hljs-type { color: #4ec9b0; }
        .hljs-meta { color: #569cd6; }
        .hljs-preprocessor { color: #c586c0; }

        /* Initial loading screen */
        @keyframes lms-spin { to { transform: rotate(360deg); } }
        #initial-loader {
            position: fixed; inset: 0;
            background: linear-gradient(160deg, #FFF5F7 0%, #FFE4EC 50%, #FFD1DC 100%);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; flex-direction: column; gap: 14px;
        }
        #initial-loader .loader-logo {
            width: 90px; height: 90px; border-radius: 50%;
            box-shadow: 0 6px 30px rgba(236,72,153,.25);
            background: white;
            display: flex; align-items: center; justify-content: center;
            padding: 6px;
        }
        #initial-loader .loader-logo img { width: 100%; border-radius: 50%; }
        #initial-loader .loader-ring {
            width: 48px; height: 48px;
            border: 4px solid #FFD1DC;
            border-top-color: #EC407A;
            border-radius: 50%;
            animation: lms-spin 0.9s linear infinite;
        }
        #initial-loader h2 {
            color: #AD1457; font-size: 17px; font-weight: 700; text-align: center;
            max-width: 320px; line-height: 1.5;
        }
        #initial-loader p { color: #F48FB1; font-size: 13px; }

        /* K-Minimal card style helper */
        .k-card {
            background: #fff;
            border-radius: 20px;
            border: 1px solid #FFD1DC;
            box-shadow: 0 4px 20px rgba(236,64,122,.07);
        }
        .k-btn-pink {
            background: linear-gradient(135deg, #EC407A, #C2185B);
            color: #fff; border: none; border-radius: 12px;
            font-family: 'Prompt', sans-serif; font-weight: 600;
            transition: opacity .15s, transform .15s;
            cursor: pointer;
        }
        .k-btn-pink:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
        .k-btn-pink:disabled { opacity: .5; cursor: not-allowed; }
        .k-btn-outline {
            background: #fff;
            color: #C2185B; border: 1.5px solid #FFD1DC; border-radius: 12px;
            font-family: 'Prompt', sans-serif; font-weight: 600;
            transition: border-color .15s, background .15s;
            cursor: pointer;
        }
        .k-btn-outline:hover:not(:disabled) { border-color: #EC407A; background: #FFF5F7; }
        .k-input {
            border: 1.5px solid #E0E0E0; border-radius: 12px;
            padding: 11px 16px; font-family: 'Prompt', sans-serif;
            outline: none; transition: border-color .2s, box-shadow .2s;
            width: 100%;
        }
        .k-input:focus { border-color: #EC407A; box-shadow: 0 0 0 3px rgba(236,64,122,.12); }
        .k-badge-student { background: #FFE4EC; color: #C2185B; }
        .k-badge-teacher  { background: #E8F5E9; color: #2E7D32; }
        .k-badge-admin    { background: #EDE7F6; color: #5E35B1; }

        /* CodeMirror theme overrides for integration */
        .CodeMirror {
            height: 100% !important;
            min-height: inherit !important;
            font-family: 'JetBrains Mono', 'Consolas', 'Monaco', monospace !important;
            font-size: 14px !important;
            line-height: 1.6 !important;
            border-radius: 0.75rem !important;
        }
        .CodeMirror-scroll { min-height: inherit !important; }
        .CodeMirror-placeholder { color: #6a737d !important; }
        /* Active line highlight (dracula-compatible) */
        .CodeMirror-activeline-background { background: #2d2f3e !important; }
        /* Fold gutter */
        .CodeMirror-foldgutter { width: 14px; }
        .CodeMirror-foldgutter-open, .CodeMirror-foldgutter-folded { color: #6272a4; cursor: pointer; padding-right: 2px; }
        .CodeMirror-foldgutter-open::after { content: "▾"; }
        .CodeMirror-foldgutter-folded::after { content: "▸"; }
        .CodeMirror-foldmarker { color: #bd93f9; background: #44475a; border-radius: 3px; padding: 0 3px; font-size: 11px; cursor: pointer; }
        /* Autocomplete popup — dracula dark theme */
        .CodeMirror-hints {
            background: #282a36 !important;
            border: 1px solid #44475a !important;
            border-radius: 8px !important;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5) !important;
            font-family: 'JetBrains Mono', 'Consolas', monospace !important;
            font-size: 13px !important;
            max-height: 220px !important;
            padding: 4px !important;
            z-index: 9999 !important;
        }
        .CodeMirror-hint {
            color: #f8f8f2 !important;
            padding: 4px 10px !important;
            border-radius: 4px !important;
        }
        .CodeMirror-hint-active {
            background: #44475a !important;
            color: #50fa7b !important;
        }
    </style>
</head>
