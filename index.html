<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Powered Coding LMS</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- React 17 -->
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Highlight.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Firebase SDK v9 compat -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; }

        /* VSCode-like Code Editor */
        .code-editor-container {
            display: flex;
            background-color: #1e1e1e;
            border-radius: 0.75rem;
            overflow: hidden;
            font-family: 'JetBrains Mono', 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
        }
        .line-numbers {
            background-color: #252526;
            color: #858585;
            padding: 16px 12px;
            text-align: right;
            user-select: none;
            min-width: 50px;
            border-right: 1px solid #3e3e42;
        }
        .code-input-area {
            flex: 1;
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 16px;
            border: none;
            outline: none;
            resize: none;
            font-family: inherit;
            font-size: inherit;
            line-height: inherit;
            white-space: pre;
            overflow-wrap: normal;
            overflow-x: auto;
        }
        .code-input-area::placeholder { color: #6a737d; }

        /* Highlight.js VSCode Dark+ */
        .hljs { background: #1e1e1e; color: #d4d4d4; }
        .hljs-keyword { color: #569cd6; }
        .hljs-string { color: #ce9178; }
        .hljs-number { color: #b5cea8; }
        .hljs-comment { color: #6a9955; font-style: italic; }
        .hljs-function { color: #dcdcaa; }
        .hljs-title { color: #4ec9b0; }
        .hljs-params { color: #9cdcfe; }
        .hljs-built_in { color: #4ec9b0; }
        .hljs-type { color: #4ec9b0; }
        .hljs-meta { color: #569cd6; }
        .hljs-preprocessor { color: #c586c0; }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }

        /* Initial loading screen */
        @keyframes lms-spin { to { transform: rotate(360deg); } }
        #initial-loader {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #1e3a5f 0%, #2d6a9f 100%);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; flex-direction: column; gap: 16px;
        }
        #initial-loader .loader-ring {
            width: 56px; height: 56px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: lms-spin 0.8s linear infinite;
        }
        #initial-loader p { color: rgba(255,255,255,0.8); font-size: 16px; }
        #initial-loader h2 { color: white; font-size: 22px; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Shown before React mounts -->
    <div id="initial-loader">
        <h2>AI-Powered Coding LMS</h2>
        <div class="loader-ring"></div>
        <p>กำลังโหลดระบบ LMS...</p>
    </div>

    <div id="root"></div>

    <!--
        SCRIPT LOADING ORDER (must be maintained):
        1. firebase.js    - Firebase init (db, auth, rtdb, LANGUAGES, GEMINI_KEY)
        2. gemini.js      - Gemini API wrapper (callGeminiApi, analyzeCode, generateProblems)
        3. grader.js      - Piston code execution engine (gradeSubmission, runSampleTests)
        4. context.js     - React AuthContext + AuthProvider + useAuth
        5. components/*   - Shared UI components
        6. pages/**/*     - Page components (student, teacher, admin)
        7. app.js         - Root App + hash router (LAST)
    -->

    <script type="text/babel" src="js/firebase.js?v=3.8"></script>
    <script type="text/babel" src="js/gemini.js?v=3.8"></script>
    <script type="text/babel" src="js/grader.js?v=3.8"></script>
    <script type="text/babel" src="js/context.js?v=3.8"></script>

    <script type="text/babel" src="js/components/Spinner.js?v=3.8"></script>
    <script type="text/babel" src="js/components/CodeEditor.js?v=3.8"></script>
    <script type="text/babel" src="js/components/RadarChart.js?v=3.8"></script>
    <script type="text/babel" src="js/components/ProtectedRoute.js?v=3.8"></script>
    <script type="text/babel" src="js/components/Navbar.js?v=3.8"></script>

    <script type="text/babel" src="js/pages/LoginPage.js?v=3.8"></script>
    <script type="text/babel" src="js/pages/RegisterPage.js?v=3.8"></script>

    <script type="text/babel" src="js/pages/student/StudentDashboard.js?v=3.8"></script>
    <script type="text/babel" src="js/pages/student/CourseViewer.js?v=3.8"></script>
    <script type="text/babel" src="js/pages/student/CodingWorkspace.js?v=3.8"></script>
    <script type="text/babel" src="js/pages/student/Gradebook.js?v=3.8"></script>
    <script type="text/babel" src="js/pages/student/SubmissionHistory.js?v=3.8"></script>

    <script type="text/babel" src="js/pages/teacher/TeacherDashboard.js?v=3.8"></script>
    <script type="text/babel" src="js/pages/teacher/CourseBuilder.js?v=3.8"></script>
    <script type="text/babel" src="js/pages/teacher/AssignmentManager.js?v=3.8"></script>
    <script type="text/babel" src="js/pages/teacher/TestCaseEditor.js?v=3.8"></script>
    <script type="text/babel" src="js/pages/teacher/StudentAnalytics.js?v=3.8"></script>

    <script type="text/babel" src="js/pages/admin/AdminDashboard.js?v=3.8"></script>
    <script type="text/babel" src="js/pages/admin/UserManager.js?v=3.8"></script>
    <script type="text/babel" src="js/pages/admin/SystemSettings.js?v=3.8"></script>

    <script type="text/babel" src="js/app.js?v=3.8"></script>

</body>
</html>
