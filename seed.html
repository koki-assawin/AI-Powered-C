function generateClassCode() {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let code = '';
    for (let i = 0; i < 6; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
    return code;
}

function showMsg(text, type) {
    document.getElementById('msgBox').innerHTML = `<div class="msg ${type}">${text}</div>`;
}

function appendLog(text, type) {
    const log = document.getElementById('log');
    log.style.display = 'block';
    const line = document.createElement('div');
    line.className = type || '';
    line.textContent = text;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
}

async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) { showMsg('กรุณากรอกอีเมลและรหัสผ่าน', 'error'); return; }
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = 'กำลังเข้าสู่ระบบ...';
    try {
        const cred = await auth.signInWithEmailAndPassword(email, password);
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('seedSection').style.display = 'block';
        document.getElementById('userInfo').textContent = `✅ เข้าสู่ระบบแล้ว: ${cred.user.email} (UID: ${cred.user.uid})`;
        document.getElementById('msgBox').innerHTML = '';
    } catch (err) {
        showMsg('เกิดข้อผิดพลาด: ' + err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'เข้าสู่ระบบ';
    }
}
